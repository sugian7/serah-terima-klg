<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terima KLG</title>

<meta name="theme-color" content="#1e3a8a">

<style>
:root{
  --primary:#1e3a8a;
  --success:#15803d;
  --danger:#b91c1c;
  --bg:#f4f6f8;
  --card:#ffffff;
  --border:#e2e8f0;
}
body{
  margin:0;background:var(--bg);
  font-family:system-ui;
}
.container{max-width:480px;margin:0 auto;padding:16px}
.card{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  margin-bottom:16px;
}
input{
  width:100%;padding:14px;margin-top:6px;
  font-size:18px;border-radius:12px;
  border:1px solid var(--border);
  text-align:center;
}
button{
  width:100%;padding:14px;font-size:16px;
  border-radius:12px;border:none;margin-top:14px;
}
.primary{background:var(--primary);color:#fff}
.secondary{background:#fff;border:1px solid var(--border)}
.success{background:var(--success);color:#fff}
.status-big{
  display:none;
  padding:16px;
  border-radius:12px;
  font-weight:700;
  text-align:center;
  margin-top:12px;
}
#preview{
  width:100%;
  max-height:300px;
  object-fit:contain;
  border-radius:12px;
  margin-top:12px;
  display:none;
}
#globalLoading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  color:#fff;
  font-size:18px;
  font-weight:600;
}
</style>
</head>

<body>

<div id="globalLoading">Memproses...</div>

<div class="container">

<div class="card">
  <label>Nomor Layanan</label>
  <input id="nomor" inputmode="numeric"
    placeholder="Masukkan nomor layanan"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')">
  <button class="primary" id="searchBtn" onclick="cari()">Cari Data</button>
</div>

<div class="card" id="dataCard" style="display:none">
  <div id="dataArea"></div>
  <button class="secondary" onclick="openCamera()">Ambil Foto Bukti</button>
  <img id="preview">
  <button id="sendBtn" class="success" onclick="kirim()" style="display:none">
    Konfirmasi Serah Terima
  </button>
</div>

<div id="bigStatus" class="status-big"></div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwebTkxbityfs7OvkF27LVonG3c9wfY5ylrd8zrxVikLiBjOtk4ld1zhx7IXwGwOE5PNg/exec";
const SECRET_KEY="yhggt5540YhGGtxthpBGTSugiantech";

let currentNomor="", fotoBase64="", stream=null, submitting=false;

function showLoading(){globalLoading.style.display="flex";}
function hideLoading(){globalLoading.style.display="none";}

function showStatus(msg,type){
  bigStatus.style.display="block";
  bigStatus.innerText=msg;
  if(type==="success"){
    bigStatus.style.background="#dcfce7";
    bigStatus.style.color="#166534";
  }else{
    bigStatus.style.background="#fee2e2";
    bigStatus.style.color="#991b1b";
  }
}

function cari(){

  if(!navigator.onLine){
    showStatus("Tidak ada koneksi internet","error");
    return;
  }

  const val=nomor.value.trim();
  if(!val){
    showStatus("Nomor belum diisi","error");
    return;
  }

  showLoading();
  searchBtn.disabled=true;

  fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`key=${SECRET_KEY}&action=cari&nomor=${val}`
  })
  .then(r=>r.json())
  .then(res=>{
    hideLoading();
    searchBtn.disabled=false;

    if(!res.ok){
      showStatus(res.msg,"error");
      return;
    }

    currentNomor=val;
    dataCard.style.display="block";

    dataArea.innerHTML=`
      <b>Nama:</b> ${res.nama}<br>
      <b>NIK:</b> ${res.nik}<br>
      <b>Kelurahan:</b> ${res.kelurahan}<br>
      <b>Kecamatan:</b> ${res.kecamatan}<br>
      <b>Kota:</b> ${res.kota}
    `;

    dataCard.scrollIntoView({behavior:"smooth"});
  });
}

async function openCamera(){
  stream=await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:"environment",
      width:{ideal:1280},
      height:{ideal:720}
    }
  });

  const video=document.createElement("video");
  video.srcObject=stream;
  video.play();

  setTimeout(()=>{
    const canvas=document.createElement("canvas");
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);

    fotoBase64=canvas.toDataURL("image/jpeg",0.6);
    preview.src=fotoBase64;
    preview.style.display="block";
    sendBtn.style.display="block";

    stream.getTracks().forEach(t=>t.stop());
  },1500);
}

function kirim(){

  if(submitting) return;
  submitting=true;

  showLoading();
  sendBtn.disabled=true;

  fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`key=${SECRET_KEY}&action=serah_terima&nomor=${currentNomor}&foto=${fotoBase64.split(",")[1]}`
  })
  .then(r=>r.json())
  .then(res=>{
    hideLoading();
    submitting=false;
    sendBtn.disabled=false;

    if(!res.ok){
      showStatus(res.msg,"error");
      return;
    }

    showStatus("Serah Terima Berhasil","success");

    setTimeout(()=>{
      nomor.value="";
      dataCard.style.display="none";
      preview.style.display="none";
      sendBtn.style.display="none";
      bigStatus.style.display="none";
    },2000);
  });
}

window.addEventListener("offline",()=>{
  showStatus("Koneksi terputus","error");
});
</script>

</body>
</html>
