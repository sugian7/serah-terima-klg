<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terima KLG</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0;padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px}
input,button{width:100%;padding:12px;margin-top:8px}
button{cursor:pointer}
#preview{width:100%;max-height:320px;display:none;margin-top:12px}
#status{margin-top:12px;font-weight:bold}
.loading{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:center;justify-content:center;
  color:#fff;font-size:18px;font-weight:bold;
}
.modal{
  position:fixed;inset:0;background:#000;
  display:none;z-index:9999;
}
.modal video{width:100%;height:100%;object-fit:cover}
.modal-actions{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;gap:10px;padding:10px;
  background:rgba(0,0,0,.7);
}
.modal-actions button{flex:1}
</style>
</head>

<body>

<div class="loading" id="loading">Memproses...</div>

<div class="card" id="searchCard">
  <label>Nomor Layanan</label>
  <input id="nomor" inputmode="numeric">
  <button onclick="cari()">Cari Data</button>
</div>

<div class="card" id="dataCard" style="display:none">
  <div><b>Nomor:</b> <span id="dNomor"></span></div>
  <div><b>Nama:</b> <span id="dNama"></span></div>
  <div><b>NIK:</b> <span id="dNik"></span></div>
  <div><b>Kategori:</b> <span id="dKategori"></span></div>
  <div><b>Kelurahan:</b> <span id="dKel"></span></div>
  <div><b>Kecamatan:</b> <span id="dKec"></span></div>
  <div><b>Kota:</b> <span id="dKota"></span></div>
  <div><b>Provinsi:</b> <span id="dProv"></span></div>

  <button id="btnFoto" onclick="openCamera()">Ambil Foto Bukti</button>
  <img id="preview">
  <button id="btnKirim" style="display:none" onclick="kirim()">Konfirmasi Serah Terima</button>
</div>

<div id="status"></div>

<div class="modal" id="cameraModal">
  <video id="video" autoplay playsinline></video>
  <div class="modal-actions">
    <button onclick="closeCamera()">Batal</button>
    <button onclick="takePhoto()">Ambil</button>
  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbx0Lunwp1mVcPlti8h3GoMi7sa33UOOm_ANjh8_6XRk_0t-Ja3uNRGo26g1Mg-V07Nm4g/exec";
const SECRET_KEY="yhggt5540YhGGtxthpBGTSugiantech";

let currentNomor="";
let fotoBase64="";
let stream=null;
let submitting=false;

function showLoading(){loading.style.display="flex";}
function hideLoading(){loading.style.display="none";}
function showStatus(msg){status.innerText=msg;}

function cari(){

  showStatus("");
  const val=nomor.value.trim();
  if(!val){showStatus("Nomor kosong");return;}

  showLoading();

  fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`key=${SECRET_KEY}&action=cari&nomor=${val}`
  })
  .then(r=>r.json())
  .then(res=>{
    hideLoading();

    if(!res.ok){
      showStatus(res.msg);
      return;
    }

    currentNomor=val;
    dataCard.style.display="block";

    dNomor.textContent=res.nomor_layanan;
    dNama.textContent=res.nama;
    dNik.textContent=res.nik;
    dKategori.textContent=res.kategori;
    dKel.textContent=res.kelurahan;
    dKec.textContent=res.kecamatan;
    dKota.textContent=res.kota;
    dProv.textContent=res.provinsi;
  })
  .catch(()=>{
    hideLoading();
    showStatus("Server error");
  });
}

async function openCamera(){
  cameraModal.style.display="block";
  stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
}

function closeCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  cameraModal.style.display="none";
}

function takePhoto(){
  const c=document.createElement("canvas");
  c.width=video.videoWidth;
  c.height=video.videoHeight;
  c.getContext("2d").drawImage(video,0,0);

  fotoBase64=c.toDataURL("image/jpeg",0.6);
  preview.src=fotoBase64;
  preview.style.display="block";

  closeCamera();

  btnFoto.style.display="none";
  searchCard.style.display="none";
  btnKirim.style.display="block";
}

function kirim(){

  if(submitting) return;
  if(!fotoBase64){showStatus("Foto belum diambil");return;}

  submitting=true;
  showLoading();

  fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`key=${SECRET_KEY}&action=serah_terima&nomor=${currentNomor}&foto=${encodeURIComponent(fotoBase64.split(",")[1])}`
  })
  .then(r=>r.json())
  .then(res=>{
    hideLoading();
    submitting=false;

    if(!res.ok){
      showStatus(res.msg);
      return;
    }

    showStatus("Serah Terima Berhasil");

    setTimeout(()=>{
      location.reload();
    },1500);
  })
  .catch(()=>{
    hideLoading();
    submitting=false;
    showStatus("Server error");
  });
}
</script>

</body>
</html>
