<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terima KLG</title>

<style>
body{
  margin:0;
  background:#f4f6f8;
  font-family:system-ui;
}
.container{
  max-width:480px;
  margin:0 auto;
  padding:16px;
}
.card{
  background:#fff;
  padding:16px;
  border-radius:16px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  margin-bottom:16px;
}
button{
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:12px;
  border:none;
  background:#1e3a8a;
  color:#fff;
}
#preview{
  width:100%;
  margin-top:12px;
  display:none;
}
#loading{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.5);
  color:#fff;
  align-items:center;
  justify-content:center;
  font-size:18px;
}
</style>
</head>

<body>

<div id="loading">Memproses...</div>

<div class="container">

  <div class="card">
    <input id="nomor" placeholder="Nomor Layanan">
    <button onclick="cari()">Cari Data</button>
  </div>

  <div class="card" id="dataCard" style="display:none">
    <div><b>Nama:</b> <span id="nama"></span></div>
    <div><b>NIK:</b> <span id="nik"></span></div>
    <div><b>Kategori:</b> <span id="kategori"></span></div>

    <button onclick="ambilFoto()">Ambil Foto</button>
    <img id="preview">
    <button id="btnKirim" style="display:none" onclick="kirim()">Konfirmasi</button>
  </div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyYyEbkf3sbbDyLxXfmGZP49owPjL-SK24clUKS2Jk4mIkIreVU3S38kb_u8XB2XAs/exec";
const SECRET_KEY="yhggt5540YhGGtxthpBGTSugiantech";

let currentNomor="";
let fotoBase64="";

function showLoading(){ loading.style.display="flex"; }
function hideLoading(){ loading.style.display="none"; }

function cari(){
  const val = nomor.value.trim();
  if(!val) return;

  showLoading();

  fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`key=${SECRET_KEY}&action=cari&nomor=${val}`
  })
  .then(r=>r.json())
  .then(res=>{
    hideLoading();
    if(!res.ok){ alert(res.msg); return; }

    currentNomor=val;
    dataCard.style.display="block";
    nama.textContent=res.nama;
    nik.textContent=res.nik;
    kategori.textContent=res.kategori;
  })
  .catch(()=>{
    hideLoading();
    alert("Server tidak merespons");
  });
}

function ambilFoto(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    const video=document.createElement("video");
    video.srcObject=stream;
    video.play();

    setTimeout(()=>{
      const canvas=document.createElement("canvas");
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      canvas.getContext("2d").drawImage(video,0,0);

      fotoBase64=canvas.toDataURL("image/jpeg",0.7);

      preview.src=fotoBase64;
      preview.style.display="block";
      btnKirim.style.display="block";

      stream.getTracks().forEach(t=>t.stop());
    },1000);
  });
}

function kirim(){
  showLoading();

  fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`key=${SECRET_KEY}&action=serah_terima&nomor=${currentNomor}&foto=${encodeURIComponent(fotoBase64.split(",")[1])}`
  })
  .then(r=>r.json())
  .then(res=>{
    hideLoading();
    if(!res.ok){ alert(res.msg); return; }
    alert("Berhasil");
    dataCard.style.display="none";
  })
  .catch(()=>{
    hideLoading();
    alert("Server tidak merespons");
  });
}
</script>

</body>
</html>
